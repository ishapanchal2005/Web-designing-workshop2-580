<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Demo</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">MySite</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Card Section -->
<div class="container mt-5">
  <div class="card" style="width: 18rem;">
    <img src="https://media.wired.com/photos/68a379057f0a507da2040dfa/master/w_1600%2Cc_limit/%2520Dell%252014%2520Premium%25207%2520Source%2520Luke%2520Larsen.png" class="card-img-top" alt="Image">
    <div class="card-body">
      <h5 class="card-title">Sample Card</h5>
      <p class="card-text">This is a simple Bootstrap card.</p>
      <a href="#" class="btn btn-primary">Click Me</a>
    </div>
  </div>
</div>

<!-- Progress Bar -->
<div class="container mt-5">
  <h5>Loading Progress</h5>
  <div class="progress">
    <div class="progress-bar progress-bar-striped progress-bar-animated"
         style="width: 70%">
      70%
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
